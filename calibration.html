<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sincro — Calibración audio</title>
<meta name="theme-color" content="#00bec8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Sincro: redirección a la nueva ubicación del calibrador de audio (tab Sync del test-pad).">
<!--
  Redirect del antiguo standalone calibration.html al tab "Sync de audio" del
  test-pad. Hasta 2026-05-12 esta página vivía como herramienta independiente
  (metrónomo + tap) duplicando la funcionalidad ya presente en test-pad.html.
  La consolidación elimina la duplicidad y centraliza toda la calibración bajo
  un único punto: Comprobar el equipo → Sync de audio.

  Se mantiene la URL por compatibilidad con deep-links externos (manifest
  shortcuts, posibles bookmarks, README antiguo). Dos escenarios:

  1. Standalone (acceso directo a calibration.html): redirige el navegador
     entero a test-pad.html#alfombra-sync vía location.replace para no
     dejar la entrada en el history (back vuelve al referrer original, no a
     este redirect).

  2. Embebido en app.html (iframe del shell SPA): el shell carga directamente
     test-pad.html#alfombra-sync vía la ruta /calibration en app.html, así que
     este HTML no se renderiza en ese flujo. El redirect solo dispara en
     accesos directos.
-->
<meta http-equiv="refresh" content="0; url=test-pad.html#alfombra-sync">
<link rel="canonical" href="test-pad.html#alfombra-sync">
<style>
  body { margin: 0; padding: 40px 20px; background: #0f172a; color: #e2e8f0;
         font-family: system-ui, -apple-system, sans-serif; text-align: center; }
  a { color: #00bec8; }
</style>
</head>
<body>
  <p>Redirigiendo a <a href="test-pad.html#alfombra-sync">Comprobar el equipo · Sync de audio</a>…</p>
  <script>
    // Fallback JS por si <meta refresh> está bloqueado por política CSP o ad-blocker.
    // location.replace en lugar de href para no inflar el history stack.
    window.location.replace('test-pad.html#alfombra-sync');
  </script>
</body>
</html>
